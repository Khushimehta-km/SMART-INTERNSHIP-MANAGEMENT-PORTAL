<!DOCTYPE html>
<html>
<head>
  <title>Mindlabz Internship Management Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="dashboard-title">
    <h1>mindlabz</h1>
    <p>Hospitality Services Pvt. Ltd.</p>
    <h2>Internship Management Dashboard</h2>
  </div>

  <h3 id="welcome"></h3>

  <div class="cards">
    <div class="card">Users<br><span id="totalUsers">0</span></div>
    <div class="card">Reports<br><span id="totalReports">0</span></div>
    <div class="card">Attendance<br><span id="totalAttendance">0</span></div>
    <div class="card">Feedback<br><span id="totalFeedbacks">0</span></div>
  </div>

  <section id="reportSection">
    <h2>Submit Daily Work Report</h2>
    <input type="text" id="taskTitle" placeholder="Task Title">
    <textarea id="workDone" placeholder="Work Done Today"></textarea>
    <button onclick="submitReport()">Submit Report</button>
  </section>

  <section id="attendanceSection">
    <h2>Mark Attendance</h2>
    <select id="attendanceStatus">
      <option>Present</option>
      <option>Absent</option>
    </select>
    <button onclick="markAttendance()">Mark Attendance</button>
  </section>

  <section id="feedbackSection">
    <h2>Mentor Feedback</h2>
    <input type="text" id="mentorName" placeholder="Mentor Name">
    <textarea id="comment" placeholder="Feedback Comment"></textarea>
    <input type="number" id="rating" placeholder="Rating out of 5">
    <button onclick="addFeedback()">Add Feedback</button>
  </section>

  <section>
    <h2>Submitted Reports</h2>
    <div id="reportsList"></div>
  </section>

  <button onclick="window.location.href='report.html'">Generate Final Report</button>
</div>
<div><button class="logout-btn" onclick="logout()">Logout</button></div>
 



<script src="script.js"></script>
</body>
</html>
